<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" fill="none">
  <!-- Gradient and shadow definitions -->
  <defs>
    <linearGradient id="bus-grad" x1="16" y1="32" x2="112" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00b2e6" />
      <stop offset="100%" stop-color="#007fa8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Main Bus Body -->
    <path d="M 36,32 h 70 a 6,6 0 0 1 6,6 v 40 a 6,6 0 0 1 -6,6 H 16 V 52 C 16,41 25,32 36,32 Z" fill="url(#bus-grad)" />

    <!-- Front Windshield / Driver Window -->
    <path d="M 28,40 H 42 V 58 H 20 C 20,49 23,40 28,40 Z" fill="#0d1b2a" />

    <!-- Passenger Windows -->
    <rect x="48" y="40" width="18" height="18" rx="3" fill="#0d1b2a" />
    <rect x="72" y="40" width="18" height="18" rx="3" fill="#0d1b2a" />
    <rect x="96" y="40" width="10" height="18" rx="2" fill="#0d1b2a" />

    <!-- Side Accent Stripe (Transit Livery) -->
    <rect x="16" y="64" width="96" height="4" fill="#fabc14" />

    <!-- Wheels (Tires & Rims) -->
    <!-- Front Wheel -->
    <circle cx="40" cy="84" r="13" fill="#0d1b2a" />
    <circle cx="40" cy="84" r="5" fill="#ffffff" stroke="#007fa8" stroke-width="2" />

    <!-- Rear Wheel -->
    <circle cx="88" cy="84" r="13" fill="#0d1b2a" />
    <circle cx="88" cy="84" r="5" fill="#ffffff" stroke="#007fa8" stroke-width="2" />
  </g>
</svg>